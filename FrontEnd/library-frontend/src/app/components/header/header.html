<mat-toolbar color="primary" class="toolbar">

  <span class="title">Library</span>

  <span class="spacer"></span>

  <div class="nav-container" #navContainer>

    <!-- Mobile menu toggle -->
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      &#9776;
    </button>

    <!-- Navigation menu -->
    <div class="nav-menu" [class.open]="menuOpen">

      <button mat-button routerLink="/dashboard" (click)="closeMenu()">Dashboard</button>
      <button mat-button routerLink="/books" (click)="closeMenu()">Books</button>
      <button mat-button routerLink="/borrowed" (click)="closeMenu()">My Borrowed</button>
      <button mat-button routerLink="/overdue" (click)="closeMenu()">Overdue</button>

      <button *ngIf="showLogout" mat-raised-button color="warn" (click)="logout()">Logout</button>

    </div>

  </div>

</mat-toolbar>
