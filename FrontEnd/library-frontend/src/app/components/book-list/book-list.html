<app-header></app-header>

<div class="container">

  <h1 class="page-title">
    Available Books
  </h1>

  <!-- PDF OVERLAY -->
  <div class="pdf-overlay" *ngIf="readingBookUrl">

    <app-pdf-reader
      [pdfSrc]="readingBookUrl"
      (onClose)="closeReader()">
    </app-pdf-reader>

  </div>

  <ng-container *ngIf="books$ | async as groupedBooks; else loading">

    <!-- SUB NAV -->
    <div class="sub-nav" *ngIf="hasBooks(groupedBooks)">

      <button
        *ngFor="let key of objectKeys(groupedBooks)"
        (click)="scrollToCategory(key)">

        {{ key | titlecase }}

      </button>

    </div>

    <div *ngIf="hasBooks(groupedBooks); else emptyState">

      <div
        class="category-section"
        *ngFor="let title of objectKeys(groupedBooks)"
        [attr.id]="title">

        <h2 class="category-title">
          {{ title | titlecase }} Books
        </h2>

        <div class="books-grid">

          <div
            class="book-card"
            *ngFor="let book of groupedBooks[title]">

            <div *ngIf="book.is_borrowed"
                 class="borrowed-badge">
              Borrowed
            </div>

            <img
              [src]="book.photo_url || 'assets/default-book-cover.jpg'"
              alt="{{book.title}}"
              class="book-cover"
              (error)="onImageError($event)"
            >

            <div class="book-info">

              <h3 class="book-title">
                {{ book.title }}
              </h3>

              <p class="book-author">
                {{ book.author }}
              </p>

              <p class="book-description">
                {{ book.description }}
              </p>

            </div>

            <div class="book-actions">

              <button
                mat-raised-button
                color="primary"
                *ngIf="!book.is_borrowed"
                (click)="borrowBook(book.id)">

                Borrow

              </button>

              <div *ngIf="book.is_borrowed"
                   class="borrowed-actions">

                <button
                  mat-raised-button
                  color="warn"
                  (click)="returnBook(book.id)">

                  Return

                </button>

                <button
                  mat-raised-button
                  color="accent"
                  *ngIf="book.file_url"
                  (click)="readBook(book.id)">

                  Read

                </button>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </ng-container>

  <ng-template #loading>
    <p class="loading">Loading books...</p>
  </ng-template>

  <ng-template #emptyState>
    <p class="no-books">No books available right now.</p>
  </ng-template>

</div>
