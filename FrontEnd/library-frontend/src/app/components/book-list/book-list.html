<app-header></app-header>

<div class="container">

  <h1 class="page-title">
    Available Books
  </h1>

  <!-- PDF OVERLAY -->
  <div class="pdf-overlay" *ngIf="readingBookUrl">

    <app-pdf-reader
      [pdfSrc]="readingBookUrl"
      (onClose)="closeReader()">
    </app-pdf-reader>

  </div>

<ng-container *ngIf="books$ | async as groupedBooks; else loading">

  <div *ngIf="hasBooks(groupedBooks); else emptyState">

    <div
      class="category-section"
      *ngFor="let category of objectKeys(groupedBooks)">

      <h2 class="category-title">
        {{ category }}
      </h2>

      <div class="books-grid">

        <div
          class="book-card"
          *ngFor="let book of groupedBooks[category]">

          <div *ngIf="book.is_borrowed"
               class="borrowed-badge">
            Borrowed
          </div>

          <img
            [src]="book.photo_url || 'assets/default-book-cover.jpg'"
            alt="{{book.title}}"
            class="book-cover"
            (error)="onImageError($event)"
          >

          <div class="book-info">

            <h3 class="book-title">
              {{ book.title }}
            </h3>

            <p class="book-author">
              {{ book.author }}
            </p>

            <p class="book-description">
              {{ book.description }}
            </p>

          </div>

          <div class="book-actions">

            <button
              mat-raised-button
              color="primary"
              *ngIf="!book.is_borrowed"
              (click)="borrowBook(book.id)">

              Borrow

            </button>

            <div *ngIf="book.is_borrowed"
                 class="borrowed-actions">

              <button
                mat-raised-button
                color="warn"
                (click)="returnBook(book.id)">

                Return

              </button>

              <button
                mat-raised-button
                color="accent"
                *ngIf="book.file_url"
                (click)="readBook(book.id)">

                Read

              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</ng-container>

<ng-template #loading>
  <p class="loading">
    Loading books...
  </p>
</ng-template>

<ng-template #emptyState>
  <p class="no-books">
    No books available right now.
  </p>
</ng-template>
