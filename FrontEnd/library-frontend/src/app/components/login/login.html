<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Online Library Login</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <!-- Google Login Button -->
      <button
        mat-raised-button
        class="full-width google-btn"
        (click)="loginWithGoogle()"
        [disabled]="isLoading">
        <mat-icon svgIcon="google" class="google-icon">G</mat-icon>
        Continue with Google
      </button>

      <div class="divider">
        <span>OR</span>
      </div>

      <!-- Email/Password Login -->
      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username or Email</mat-label>
          <input matInput [(ngModel)]="username" name="username" required>
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button 
          mat-raised-button 
          color="primary"
          type="submit"
          class="full-width"
          [disabled]="isLoading">
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
      </form>

      <div class="links">
         <a routerLink="/dashboard">Access Dashboard</a><br>
        <a routerLink="/forgot-password">Forgot Password?</a><br>
        <a routerLink="/register">Don't have an account? Register here</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
