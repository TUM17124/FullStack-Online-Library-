name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # Minimum allowed (every 5 minutes)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Render Backend
        run: |
          echo "Starting backend health check..."
          for i in {1..5}; do
            echo "Attempt $i..."
            if curl -f -s --max-time 30 --connect-timeout 10 https://online-library-tum.onrender.com/health/ 2>&1; then
              echo "Backend is alive"
              exit 0
            fi
            echo "Failed, retrying..."
            sleep 3
          done
          echo "Backend appears to be down"
          exit 0