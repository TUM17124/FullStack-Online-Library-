name: Keep Backend Alive  # The name of the workflow

# When the workflow runs
on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:       # Also allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Backend
        run: curl -s https://online-library-tum.onrender.com/login > /dev/null || echo "Backend is down"